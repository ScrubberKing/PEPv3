<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI Calculator — Nilfisk Americas</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1A2533;--teal:#1B6CA8;--teal-light:#2E8FD4;
    --cream:#B3BBC5;--warm-white:#F0F1F3;--gold:#E9C46A;
    --red:#E76F51;--mid:#5A6472;--border:#C8CDD4;
    --shadow:0 2px 16px rgba(26,37,51,0.10);
    --auto:#7C3AED;--auto-light:#A78BFA;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Roboto',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;}
  header{background:var(--navy);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}

  /* ── LOGO AREA ── */
  .header-brand{display:flex;align-items:center;gap:14px;}
  .header-logo svg{display:block;height:22px;width:auto;}
  .header-divider{width:1px;height:28px;background:rgba(255,255,255,0.25);}
  .logo{font-family:'Roboto',sans-serif;font-size:0.88rem;font-weight:400;color:rgba(255,255,255,0.75);letter-spacing:0.3px;white-space:nowrap;}

  .step-pills{display:flex;gap:6px;}
  .pill{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:600;font-family:'Roboto Mono',monospace;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);transition:all 0.3s;cursor:pointer;}
  .pill.active{background:var(--teal);color:white;}
  .pill.done{background:rgba(27,108,168,0.35);color:var(--teal-light);}
  .pill.auto-pill.active{background:var(--auto);}
  .shell{max-width:860px;margin:0 auto;padding:40px 24px 80px;}
  .step-header{margin-bottom:32px;}
  .step-label{font-family:'Roboto Mono',monospace;font-size:0.72rem;font-weight:500;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
  .step-label.auto{color:var(--auto);}
  .step-title{font-family:'Roboto',sans-serif;font-size:2rem;font-weight:300;color:var(--navy);line-height:1.15;margin-bottom:8px;}
  .step-desc{font-size:0.9rem;color:var(--mid);line-height:1.6;}

  /* ── ISSA DISCLAIMER ── */
  .issa-disclaimer{display:flex;align-items:flex-start;gap:10px;background:#F0F4F8;border:1px solid #C8D8E8;border-left:3px solid var(--teal);border-radius:8px;padding:10px 14px;margin-top:12px;font-size:0.78rem;color:var(--mid);line-height:1.5;}
  .issa-disclaimer .issa-icon{font-size:0.9rem;flex-shrink:0;margin-top:1px;}
  .issa-disclaimer strong{color:var(--navy);}

  .card{background:var(--warm-white);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card-title{font-size:0.78rem;font-weight:600;font-family:'Roboto Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .pair-block{border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;background:white;position:relative;z-index:1;}
  .pair-block:focus-within{z-index:30;}
  .pair-block .pair-num{font-family:'Roboto Mono',monospace;font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:14px;}
  .pair-remove{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--mid);cursor:pointer;font-size:1.1rem;line-height:1;padding:2px 6px;border-radius:4px;transition:color 0.2s,background 0.2s;}
  .pair-remove:hover{color:var(--red);background:#FEE2E2;}
  .proc-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start;margin-bottom:0;}
  .proc-row > div{min-width:0;position:relative;z-index:10;}
  .proc-row > div:focus-within{z-index:20;}
  .proc-row select,.proc-row input{width:100%;min-width:0;}

  /* ── TOOLTIP ── */
  .tooltip-wrap{position:relative;display:inline-flex;align-items:center;gap:5px;cursor:default;}
  .tooltip-icon{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--teal);color:white;font-size:0.65rem;font-weight:700;font-family:'Roboto',sans-serif;cursor:pointer;flex-shrink:0;line-height:1;}

  .savings-callout{background:#1A2533;border-radius:12px;padding:24px 28px;margin-top:20px;margin-bottom:4px;}
  .savings-callout-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.5);font-family:'Roboto Mono',monospace;margin-bottom:16px;}
  .savings-callout-rows{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .sc-item{background:rgba(255,255,255,0.07);border-radius:8px;padding:14px 18px;}
  .sc-item.positive{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);}
  .sc-item.payment{background:rgba(233,196,106,0.15);border:1px solid rgba(233,196,106,0.3);}
  .sc-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;font-family:'Roboto Mono',monospace;margin-bottom:6px;}
  .sc-item.positive .sc-label{color:#86EFAC;}
  .sc-item.payment .sc-label{color:#FDE68A;}
  .sc-val{font-family:'Roboto',sans-serif;font-size:2rem;font-weight:700;line-height:1;}
  .sc-item.positive .sc-val{color:#4ADE80;}
  .sc-item.payment .sc-val{color:var(--gold);}
  .sc-net{margin-top:16px;padding:14px 18px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;}
  .sc-net.win{background:rgba(34,197,94,0.2);border:1.5px solid rgba(34,197,94,0.4);}
  .sc-net.loss{background:rgba(231,111,81,0.2);border:1.5px solid rgba(231,111,81,0.4);}
  .sc-net-label{font-size:0.85rem;font-weight:700;color:white;}
  .sc-net-val{font-family:'Roboto Mono',monospace;font-size:1.2rem;font-weight:700;}
  .sc-net.win .sc-net-val{color:#4ADE80;}
  .sc-net.loss .sc-net-val{color:#FCA5A5;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .form-grid.three{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:600px){.form-grid,.form-grid.three{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:0.8rem;font-weight:500;color:var(--navy);opacity:0.8;}
  .field input,.field select{font-family:'Roboto',sans-serif;font-size:0.9rem;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:white;color:var(--navy);transition:border-color 0.2s,box-shadow 0.2s;outline:none;width:100%;}
  .field input:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(27,108,168,0.12);}
  .field input[type="number"]{font-family:'Roboto Mono',monospace;}
  .field .hint{font-size:0.75rem;color:var(--mid);}
  .vs-badge{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--navy);color:white;font-size:0.72rem;font-weight:700;font-family:'Roboto Mono',monospace;flex-shrink:0;align-self:center;margin-top:28px;}
  .proc-label{font-size:0.7rem;font-weight:600;font-family:'Roboto Mono',monospace;text-transform:uppercase;letter-spacing:1.2px;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:10px;}
  .proc-label.existing{background:#FEF3C7;color:#92400E;}
  .proc-label.prescribed{background:#D1FAE5;color:#065F46;}
  .rate-display{font-family:'Roboto Mono',monospace;font-size:0.82rem;color:var(--mid);margin-top:8px;padding:6px 12px;background:var(--cream);border-radius:6px;}
  .rate-display span{color:var(--teal);font-weight:500;}
  .rider-row{display:flex;align-items:center;gap:16px;padding:14px 18px;background:#EAF4FB;border:1px solid #B3D4EC;border-radius:8px;margin-top:12px;}
  .rider-row label{font-size:0.85rem;flex:1;}
  .rider-row input[type="range"]{flex:1;accent-color:var(--teal);}
  .rider-row .val{font-family:'Roboto Mono',monospace;font-size:0.9rem;font-weight:500;color:var(--teal);min-width:40px;text-align:right;}
  .auto-card{background:var(--warm-white);border:2px solid var(--auto);border-radius:12px;padding:28px;margin-bottom:16px;box-shadow:var(--shadow);}
  .auto-card-title{font-size:0.78rem;font-weight:600;font-family:'Roboto Mono',monospace;text-transform:uppercase;letter-spacing:1px;color:var(--auto);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #DDD6FE;}
  .auto-badge{display:inline-flex;align-items:center;gap:6px;font-size:0.7rem;font-family:'Roboto Mono',monospace;background:#EDE9FE;color:var(--auto);border:1px solid #C4B5FD;border-radius:20px;padding:4px 10px;margin-bottom:16px;}
  .auto-metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  @media(max-width:600px){.auto-metric-grid{grid-template-columns:1fr 1fr;}}
  .auto-metric{background:var(--warm-white);border:1px solid #C4B5FD;border-radius:12px;padding:20px 18px;position:relative;overflow:hidden;}
  .auto-metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--auto);}
  .auto-metric.highlight::before{background:var(--gold);}
  .auto-metric-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--auto);margin-bottom:8px;font-family:'Roboto Mono',monospace;opacity:0.8;}
  .auto-metric-value{font-family:'Roboto',sans-serif;font-size:1.7rem;font-weight:300;color:var(--navy);line-height:1;margin-bottom:4px;}
  .auto-metric-sub{font-size:0.75rem;color:var(--mid);}
  .auto-supervision-row{display:flex;align-items:center;gap:16px;padding:14px 18px;background:#EDE9FE;border:1px solid #C4B5FD;border-radius:8px;margin-top:12px;}
  .auto-supervision-row label{font-size:0.85rem;flex:1;}
  .auto-supervision-row input[type="range"]{flex:1;accent-color:var(--auto);}
  .auto-supervision-row .val{font-family:'Roboto Mono',monospace;font-size:0.9rem;font-weight:500;color:var(--auto);min-width:40px;text-align:right;}
  .auto-summary-bar{background:var(--navy);border:2px solid var(--auto);border-radius:12px;padding:20px 24px;color:white;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
  @media(max-width:600px){.auto-summary-bar{grid-template-columns:1fr 1fr;}}
  .auto-comparison{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .auto-comp-card{background:white;border:1px solid var(--border);border-radius:10px;padding:16px;}
  .auto-comp-card.existing{border-left:3px solid var(--gold);}
  .auto-comp-card.autonomous{border-left:3px solid var(--auto);}
  .auto-comp-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .auto-comp-card.existing .auto-comp-label{color:#92400E;}
  .auto-comp-card.autonomous .auto-comp-label{color:var(--auto);}
  .auto-comp-val{font-family:'Roboto Mono',monospace;font-size:0.9rem;font-weight:500;color:var(--navy);}
  .auto-comp-sub{font-size:0.75rem;color:var(--mid);margin-top:4px;}
  .tasks-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .task-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:white;transition:border-color 0.2s;}
  .task-row:focus-within{border-color:var(--teal);}
  .task-row label{font-size:0.82rem;flex:1;color:var(--navy);opacity:0.85;}
  .task-row input{width:64px;font-family:'Roboto Mono',monospace;font-size:0.85rem;text-align:right;border:none;outline:none;background:transparent;color:var(--navy);padding:0;}
  .task-row .unit{font-size:0.72rem;color:var(--mid);white-space:nowrap;}
  .time-bank{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-radius:10px;margin-top:16px;font-weight:500;}
  .time-bank.positive{background:#D1FAE5;color:#065F46;}
  .time-bank.negative{background:#FEE2E2;color:#991B1B;}
  .time-bank .tb-label{font-size:0.85rem;}
  .time-bank .tb-val{font-family:'Roboto Mono',monospace;font-size:1.1rem;font-weight:600;}
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  @media(max-width:600px){.metric-grid{grid-template-columns:1fr 1fr;}}
  .metric{background:var(--warm-white);border:1px solid var(--border);border-radius:12px;padding:20px 18px;position:relative;overflow:hidden;}
  .metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal);}
  .metric.highlight::before{background:var(--gold);}
  .metric.warn::before{background:var(--red);}
  .metric-label{font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--mid);margin-bottom:8px;font-family:'Roboto Mono',monospace;}
  .metric-value{font-family:'Roboto',sans-serif;font-size:1.7rem;font-weight:300;color:var(--navy);line-height:1;margin-bottom:4px;}
  .metric-sub{font-size:0.75rem;color:var(--mid);}
  .proposal-items{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .proposal-item{display:grid;grid-template-columns:60px 1fr 120px 100px 90px;gap:10px;align-items:center;}
  @media(max-width:640px){.proposal-item{grid-template-columns:40px 1fr 90px 80px;}.proposal-item .col-order{display:none;}}
  .proposal-item input{font-family:'Roboto',sans-serif;font-size:0.85rem;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;background:white;width:100%;color:var(--navy);outline:none;transition:border-color 0.2s;}
  .proposal-item input:focus{border-color:var(--teal);}
  .proposal-item .total-cell{font-family:'Roboto Mono',monospace;font-size:0.85rem;color:var(--navy);text-align:right;padding-right:4px;}
  .proposal-col-header{display:grid;grid-template-columns:60px 1fr 120px 100px 90px;gap:10px;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--mid);font-family:'Roboto Mono',monospace;padding:0 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;}
  .proposal-totals{border-top:2px solid var(--navy);padding-top:14px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .total-row{display:flex;gap:20px;align-items:center;}
  .total-row .tl{font-size:0.82rem;color:var(--mid);}
  .total-row .tv{font-family:'Roboto Mono',monospace;font-size:0.95rem;font-weight:500;color:var(--navy);min-width:100px;text-align:right;}
  .total-row.grand .tl{font-weight:600;color:var(--navy);font-size:0.9rem;}
  .total-row.grand .tv{font-size:1.1rem;font-weight:600;color:var(--teal);}
  .nav-bar{display:flex;justify-content:space-between;margin-top:32px;padding-top:24px;border-top:1px solid var(--border);}
  .btn{font-family:'Roboto',sans-serif;font-size:0.9rem;font-weight:500;padding:12px 28px;border-radius:8px;border:none;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
  .btn-primary{background:var(--teal);color:white;}
  .btn-primary:hover{background:var(--teal-light);transform:translateY(-1px);box-shadow:0 4px 14px rgba(27,108,168,0.3);}
  .btn-secondary{background:transparent;color:var(--navy);border:1.5px solid var(--border);}
  .btn-secondary:hover{border-color:var(--navy);background:var(--cream);}
  .btn-print{background:var(--navy);color:white;}
  .btn-print:hover{background:#263548;}
  .summary-bar{background:var(--navy);border-radius:12px;padding:20px 24px;color:white;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
  @media(max-width:600px){.summary-bar{grid-template-columns:1fr 1fr;}}
  .sb-item{display:flex;flex-direction:column;gap:4px;}
  .sb-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;opacity:0.6;font-family:'Roboto Mono',monospace;}
  .sb-val{font-family:'Roboto',sans-serif;font-size:1.3rem;font-weight:300;color:var(--teal-light);}
  .divider{height:1px;background:var(--border);margin:20px 0;}
  .tag{display:inline-block;font-size:0.7rem;font-weight:600;font-family:'Roboto Mono',monospace;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.8px;}
  .tag-teal{background:#D1FAE5;color:#065F46;}
  .tag-amber{background:#FEF3C7;color:#92400E;}
  .tag-auto{background:#EDE9FE;color:var(--auto);}
  .add-btn{font-size:0.82rem;color:var(--teal);background:none;border:1.5px dashed var(--teal);border-radius:6px;padding:8px 16px;cursor:pointer;transition:all 0.2s;font-family:'Roboto',sans-serif;}
  .add-btn:hover{background:#EAF4FB;}
  .payback-good{color:#065F46;}
  .payback-ok{color:#92400E;}
  .payback-warn{color:#991B1B;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:0.9rem;color:var(--mid);font-family:'Roboto Mono',monospace;}
  .loading-steps{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
  .loading-step{font-size:0.78rem;font-family:'Roboto Mono',monospace;color:var(--mid);display:flex;align-items:center;gap:8px;}
  .loading-step .dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background 0.3s;}
  .loading-step.done .dot{background:#22C55E;}
  .loading-step.active .dot{background:var(--teal);animation:pulse 1s infinite;}
  .loading-step.error .dot{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .data-badge{display:inline-flex;align-items:center;gap:6px;font-size:0.7rem;font-family:'Roboto Mono',monospace;color:var(--mid);background:var(--warm-white);border:1px solid var(--border);border-radius:20px;padding:4px 10px;margin-top:8px;}
  .data-badge .dot{width:6px;height:6px;border-radius:50%;background:#22C55E;flex-shrink:0;}
  .data-badge .dot.warn{background:var(--gold);}
  .warn-banner{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:0.85rem;color:#92400E;}
  .calc-accordion{margin-top:16px;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;}
  .calc-accordion-header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;cursor:pointer;background:var(--warm-white);user-select:none;transition:background 0.2s;}
  .calc-accordion-header:hover{background:#E8EDF2;}
  .calc-accordion-title{font-family:'Roboto Mono',monospace;font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mid);display:flex;align-items:center;gap:10px;}
  .calc-accordion-chevron{font-size:0.8rem;color:var(--mid);transition:transform 0.25s;}
  .calc-accordion-chevron.open{transform:rotate(180deg);}
  .calc-accordion-body{display:none;padding:0 22px 22px;background:var(--warm-white);}
  .calc-accordion-body.open{display:block;}
  .audit-section{margin-top:20px;}
  .audit-section-title{font-family:'Roboto Mono',monospace;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--teal);border-bottom:2px solid var(--teal);padding-bottom:6px;margin-bottom:12px;}
  .audit-table{width:100%;border-collapse:collapse;font-size:0.84rem;}
  .audit-table tr{border-bottom:1px solid var(--border);}
  .audit-table tr:last-child{border-bottom:none;}
  .audit-table td{padding:8px 6px;vertical-align:top;line-height:1.5;}
  .audit-table td:first-child{color:var(--mid);font-size:0.8rem;width:38%;}
  .audit-table td:nth-child(2){font-family:'Roboto Mono',monospace;color:var(--navy);font-weight:500;width:22%;text-align:right;}
  .audit-table td:last-child{color:var(--mid);font-size:0.78rem;font-style:italic;padding-left:14px;}
  .audit-table tr.formula-row td{background:#F8F9FB;}
  .audit-table tr.result-row td{background:#EAF4FB;font-weight:600;}
  .audit-table tr.result-row td:first-child{color:var(--navy);font-weight:600;}
  .audit-table tr.result-row td:nth-child(2){color:var(--teal);font-size:0.92rem;}
  .audit-divider{height:1px;background:var(--border);margin:18px 0;}
  .audit-pair-header{background:var(--navy);color:white;padding:8px 12px;border-radius:6px;margin-bottom:10px;font-family:'Roboto Mono',monospace;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
  @media print{
    header,.nav-bar,.step-pills,.btn,.data-badge,.calc-accordion,.add-btn{display:none!important;}
    .shell{padding:0;max-width:100%;}
    .card,.auto-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
    body{background:white;}
    .tasks-grid{break-inside:avoid;}
    .time-bank{break-inside:avoid;}
  }
</style>
</head>
<body>
<header>
  <!-- Brand: Nilfisk logo SVG + divider + app name -->
  <div class="header-brand">
    <div class="header-logo">
      <!-- Nilfisk wordmark as inline SVG — renders perfectly on any background -->
      <svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg" aria-label="Nilfisk">
        <text x="0" y="30" font-family="'Roboto',Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="4" fill="white">NILFISK</text>
      </svg>
    </div>
    <div class="header-divider"></div>
    <div class="logo">ROI Calculator</div>
  </div>
  <div class="step-pills" id="stepPills"></div>
</header>
<div class="shell" id="app"></div>
<!-- Single shared tooltip — appended to body, outside ALL stacking contexts -->
<div id="globalTooltip" style="display:none;position:fixed;z-index:2147483647;width:420px;background:#1A2533;color:white;font-size:0.78rem;font-family:'Roboto',sans-serif;font-weight:400;line-height:1.5;padding:10px 14px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.35);pointer-events:none;"></div>
<script>
// ── HARDCODED DATA (source: PEP_Data_05212026.xlsx, last updated 2026-04-01) ──
// Equipment, rates, and tasks are embedded directly. No external dependencies.
// To update: edit the objects below and redeploy the file.

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=splitCSVLine(lines[0]).map(h=>h.toLowerCase().trim());
  return lines.slice(1).map(line=>{
    const fields=splitCSVLine(line);
    const row={};
    headers.forEach((h,i)=>{row[h]=(fields[i]||'').trim();});
    return row;
  }).filter(r=>Object.values(r).some(v=>v));
}
function splitCSVLine(line){
  const fields=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){fields.push(cur);cur='';}
    else{cur+=ch;}
  }
  fields.push(cur);return fields;
}
function parseNum(v){if(typeof v==='number')return v;return parseFloat(String(v||'').replace(/,/g,''))||0;}
function isTrue(v){return typeof v==='string'&&v.trim().toUpperCase()==='TRUE';}

function joinEquipmentRates(eqRows,rateRows){
  const rateMap={};
  rateRows.filter(r=>r.category&&r.size).forEach(r=>{
    const key=makeKey(r.category,r.size);
    rateMap[key]={sqft:parseNum(r.sqft_per_hr)||parseNum(r.sqft)||0,mins:parseNum(r.mins_per_1000sqft)||parseNum(r.mins)||0};
  });
  const map={};
  eqRows.filter(r=>isTrue(r.active)&&r.category&&r.size).forEach(r=>{
    const cat=r.category;
    if(!map[cat])map[cat]=[];
    const key=makeKey(r.category,r.size);
    const rate=rateMap[key]||{sqft:0,mins:0};
    const mins=rate.mins||(rate.sqft>0?60000/rate.sqft:0);
    map[cat].push({
      size:r.size,model:r.model||'',
      sqft:rate.sqft,mins:parseFloat(mins.toFixed(4)),
      is_rider:isTrue(r.is_rider),
      is_autonomous:isTrue(r.is_autonomous),
    });
  });
  return map;
}
function makeKey(cat,size){return(cat+'|||'+size).toLowerCase().trim();}

let EQUIPMENT={},TASKS=[],dataSource='hardcoded',dataWarnings=[];

const state={
  step:1,
  contactPerson:'',facilityName:'',address:'',city:'',stateAbbr:'',zip:'',
  preparedBy:'',dealership:'',date:new Date().toLocaleDateString('en-US'),
  occupancy:'',
  pairs:[{existingCategory:'',existingEquipIdx:-1,prescribedCategory:'',prescribedEquipIdx:-1,sqFt:60000,cleaningsPerPeriod:7}],
  period:'Week',riderBonus:25,
  autoSupervisionPct:0,autoMaintenanceHrs:0.15,autoCleaningsPerPeriod:5,autoSqFtPerRun:40000,
  hourlyLaborRate:18,weeks:52,machineInvestment:0,machineLife:5,leasePayment:0,
  taskHours:{},
  proposalItems:[{qty:'',desc:'',order:'',unitCost:''},{qty:'',desc:'',order:'',unitCost:''},{qty:'',desc:'',order:'',unitCost:''}],
};

function getEquip(cat,idx){if(!cat||idx<0||!EQUIPMENT[cat])return null;return EQUIPMENT[cat][idx]||null;}
function hasAutonomousPrescribed(){return state.pairs.some(p=>{const pr=getEquip(p.prescribedCategory,p.prescribedEquipIdx);return pr&&pr.is_autonomous;});}
function totalSteps(){return hasAutonomousPrescribed()?6:5;}
function maxStep(){return hasAutonomousPrescribed()?6:5;}
function getPaybackStep(){return hasAutonomousPrescribed()?4:3;}
function getTaskStep(){return hasAutonomousPrescribed()?5:4;}
function getProposalStep(){return hasAutonomousPrescribed()?6:5;}

function calcPair(pair){
  const ex=getEquip(pair.existingCategory,pair.existingEquipIdx);
  const pr=getEquip(pair.prescribedCategory,pair.prescribedEquipIdx);
  const sqFt=parseFloat(pair.sqFt)||0;
  const cleanings=parseFloat(pair.cleaningsPerPeriod)||0;
  const riderPct=parseFloat(state.riderBonus)/100;
  const exTime=ex?(ex.mins*sqFt/1000)/60:0;
  const prTime=pr?(pr.mins*sqFt/1000)/60:0;
  const savings=exTime-prTime;
  const isRider=pr&&(pr.is_rider||(pr.size||'').toLowerCase().includes('r,'));
  const adjSavings=(isRider&&!pr?.is_autonomous)?savings*(1+riderPct):savings;
  const savingsPct=exTime>0?adjSavings/exTime:0;
  const timePerPeriod=adjSavings*cleanings;
  return{ex,pr,exTime,prTime,savingsPerCleaning:adjSavings,savingsPct,timePerPeriod};
}

function calcAuto(){
  let autoEquip=null;
  for(const p of state.pairs){const pr=getEquip(p.prescribedCategory,p.prescribedEquipIdx);if(pr&&pr.is_autonomous){autoEquip=pr;break;}}
  const sqftPerHr=autoEquip?autoEquip.sqft:9000;
  const sqFtPerRun=parseFloat(state.autoSqFtPerRun)||0;
  const cleaningsPerPeriod=parseFloat(state.autoCleaningsPerPeriod)||0;
  const supervisionPct=parseFloat(state.autoSupervisionPct)/100;
  const maintenanceHrs=parseFloat(state.autoMaintenanceHrs)||0;
  const machineRunTime=sqftPerHr>0?sqFtPerRun/sqftPerHr:0;
  const supervisionTimePerCleaning=machineRunTime*supervisionPct;
  const maintenancePerCleaning=maintenanceHrs;
  const operatorTimePerCleaning=supervisionTimePerCleaning+maintenancePerCleaning;
  let conventionalTimePerCleaning=0;
  for(const p of state.pairs){
    const ex=getEquip(p.existingCategory,p.existingEquipIdx);
    const pr=getEquip(p.prescribedCategory,p.prescribedEquipIdx);
    if(ex&&pr&&pr.is_autonomous){conventionalTimePerCleaning+=(ex.mins*sqFtPerRun/1000)/60;}
  }
  if(conventionalTimePerCleaning===0){conventionalTimePerCleaning=(23*sqFtPerRun/1000)/60;}
  const laborSavedPerCleaning=conventionalTimePerCleaning-operatorTimePerCleaning;
  const laborSavedPerPeriod=laborSavedPerCleaning*cleaningsPerPeriod;
  return{autoEquip,sqftPerHr,machineRunTime,supervisionTimePerCleaning,maintenancePerCleaning,operatorTimePerCleaning,conventionalTimePerCleaning,laborSavedPerCleaning,laborSavedPerPeriod,cleaningsPerPeriod,sqFtPerRun};
}

function calc(){
  const laborRate=parseFloat(state.hourlyLaborRate)||0;
  const weeks=parseFloat(state.weeks)||52;
  const investment=parseFloat(state.machineInvestment)||0;
  const machineLife=parseFloat(state.machineLife)||5;
  let totalTimePerPeriod=0,totalSavingsPct=0,pairCount=0;
  state.pairs.forEach(pair=>{
    const p=calcPair(pair);
    if(p.ex&&p.pr&&!p.pr.is_autonomous){totalTimePerPeriod+=p.timePerPeriod;totalSavingsPct+=p.savingsPct;pairCount++;}
  });
  if(hasAutonomousPrescribed()){const a=calcAuto();totalTimePerPeriod+=a.laborSavedPerPeriod;pairCount++;}
  const avgSavingsPct=pairCount>0?totalSavingsPct/pairCount:0;
  const laborPerPeriod=totalTimePerPeriod*laborRate;
  const annualSavings=laborPerPeriod*(state.period==='Week'?weeks:1);
  const paybackYears=annualSavings>0?investment/annualSavings:Infinity;
  const totalSavings=annualSavings*machineLife;
  const savingsPerMonth=annualSavings/12;
  const totalTaskHours=Object.values(state.taskHours).reduce((s,v)=>s+(parseFloat(v)||0),0);
  return{totalTimePerPeriod,avgSavingsPct,laborPerPeriod,annualSavings,paybackYears,totalSavings,savingsPerMonth,totalTaskHours,hoursRemaining:totalTimePerPeriod-totalTaskHours,proposalTotal:state.proposalItems.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.unitCost)||0),0)};
}

function fmtC(v){if(!isFinite(v))return'—';return'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtH(v){if(!isFinite(v)||isNaN(v))return'—';return v.toFixed(2)+' hrs';}
function fmtY(v){if(!isFinite(v)||isNaN(v)||v<=0)return'—';return v.toFixed(1)+' yrs';}
function fmtP(v){if(!isFinite(v)||isNaN(v))return'—';return(v*100).toFixed(1)+'%';}
function esc(v){return String(v||'').replace(/&/g,'&').replace(/"/g,'"').replace(/</g,'<').replace(/>/g,'>');}

// ISSA disclaimer HTML — reused on Step 2
const ISSA_DISCLAIMER = `<div class="issa-disclaimer"><span class="issa-icon">ℹ</span><span><strong>Cleaning time source:</strong> Production rates are based on ISSA 612 Cleaning Times & Tasks Calculator (Practical performance values). Actual results may vary based on facility conditions, operator proficiency, and equipment maintenance.</span></div>`;

// Rider tooltip HTML
const RIDER_TIP_TEXT = `Rider scrubbers deliver productivity gains beyond the ISSA rate in two ways: during scrubbing, the seated operator never slows down from fatigue the way a walking operator does; and after scrubbing, that same operator has energy left for the rest of their shift — bathrooms, glass, spot cleaning — while a walk-behind operator is tired and slows on everything that follows. This bonus (0–50%) captures both effects. Default 25%. Set to 0% to use the ISSA rate as-is.`;
const RIDER_TOOLTIP = `<span class="tooltip-wrap"><span class="tooltip-icon" data-tip="${RIDER_TIP_TEXT}">?</span></span>`;

const AUTO_SUP_TIP_TEXT = `This is the percentage of the machine's run time that an operator must be physically present to supervise. Lower this value if the machine has a docking station — it can autonomously return, refill, and restart with minimal human intervention. Increase this value if there is no docking station, as the operator will need to be present for refills, repositioning, and error recovery. Default 15% is a reasonable starting point for a non-docking deployment in a straightforward environment.`;

function render(){
  renderPills();
  const app=document.getElementById('app');
  const auto=hasAutonomousPrescribed();
  if(state.step===1)app.innerHTML=renderStep1();
  else if(state.step===2)app.innerHTML=renderStep2();
  else if(state.step===3&&auto)app.innerHTML=renderStepAuto();
  else if(state.step===getPaybackStep())app.innerHTML=renderStepPayback();
  else if(state.step===getTaskStep())app.innerHTML=renderStepTasks();
  else if(state.step===getProposalStep())app.innerHTML=renderStepProposal();
  else app.innerHTML=renderStep1();
  bindEvents();
}

function renderPills(){
  const auto=hasAutonomousPrescribed();
  const pills=auto
    ?[{l:'01',t:'Facility'},{l:'02',t:'Procedures'},{l:'🤖',t:'Autonomous',cls:'auto-pill'},{l:'03',t:'Payback'},{l:'04',t:'Tasks'},{l:'05',t:'Proposal'}]
    :[{l:'01',t:'Facility'},{l:'02',t:'Procedures'},{l:'03',t:'Payback'},{l:'04',t:'Tasks'},{l:'05',t:'Proposal'}];
  document.getElementById('stepPills').innerHTML=pills.map((p,i)=>{
    const s=i+1;
    const cls=s===state.step?'pill active '+(p.cls||''):s<state.step?'pill done':'pill '+(p.cls||'');
    return'<div class="'+cls.trim()+'" onclick="goStep('+s+')" title="'+p.t+'">'+p.l+'</div>';
  }).join('');
}

function dataBadge(){
  if(dataSource==='hardcoded')return'<div class="data-badge"><div class="dot"></div>Equipment & Rates — ISSA 612 Practical Values</div>';
  if(dataSource==='sheets')return'<div class="data-badge"><div class="dot"></div>Live — Equipment, Tasks & Rates from Google Sheets</div>';
  if(dataSource==='partial')return'<div class="data-badge"><div class="dot warn"></div>Partial data from Google Sheets</div>';
  return'<div class="data-badge"><div class="dot warn"></div>Fallback data — Google Sheets not reachable</div>';
}
function warningBanners(){return dataWarnings.map(w=>'<div class="warn-banner">⚠ '+esc(w)+'</div>').join('');}

function renderStep1(){
  const tot=totalSteps();
  return'<div class="step-header"><div class="step-label">Step 01 of 0'+tot+'</div><div class="step-title">Facility Background</div><div class="step-desc">Enter customer and facility information.</div>'+dataBadge()+'</div>'+warningBanners()+'<div class="card"><div class="card-title">Contact Information</div><div class="form-grid"><div class="field"><label>Facility Name</label><input id="facilityName" value="'+esc(state.facilityName)+'" placeholder="ABC Manufacturing Co."></div><div class="field"><label>Contact Person</label><input id="contactPerson" value="'+esc(state.contactPerson)+'" placeholder="Jane Smith"></div><div class="field"><label>Street Address</label><input id="address" value="'+esc(state.address)+'" placeholder="123 Industrial Blvd"></div><div class="field"><label>City</label><input id="city" value="'+esc(state.city)+'" placeholder="Chicago"></div><div class="field"><label>State</label><input id="stateAbbr" value="'+esc(state.stateAbbr)+'" placeholder="IL" maxlength="2"></div><div class="field"><label>ZIP</label><input id="zip" value="'+esc(state.zip)+'" placeholder="60601"></div></div></div><div class="card"><div class="card-title">Sales Rep Information</div><div class="form-grid"><div class="field"><label>Prepared By</label><input id="preparedBy" value="'+esc(state.preparedBy)+'" placeholder="Rep Name"></div><div class="field"><label>Dealership</label><input id="dealership" value="'+esc(state.dealership)+'" placeholder="Nilfisk Americas"></div><div class="field"><label>Date</label><input id="date" value="'+esc(state.date)+'" placeholder="MM/DD/YYYY"></div><div class="field"><label>Occupancy Type</label><input id="occupancy" value="'+esc(state.occupancy)+'" placeholder="Manufacturing / Office / Healthcare…"></div></div></div><div class="nav-bar"><div></div><button class="btn btn-primary" onclick="nextStep()">Continue to Procedures →</button></div>';
}

function renderStep2(){
  const r=calc();
  const cats=Object.keys(EQUIPMENT);
  const tot=totalSteps();
  const catOpts=(sel)=>cats.map(k=>'<option value="'+esc(k)+'" '+(sel===k?'selected':'')+'>'+esc(k)+'</option>').join('');
  const equipOpts=(cat,selIdx)=>(EQUIPMENT[cat]||[]).map((e,i)=>{
    const autoTag=e.is_autonomous?' 🤖':'';
    return'<option value="'+i+'" '+(selIdx===i?'selected':'')+'>'+esc(e.size)+(e.model?' – '+esc(e.model):'')+autoTag+' ('+e.sqft.toLocaleString(undefined,{maximumFractionDigits:0})+' sqft/hr)</option>';
  }).join('');

  let h='<div class="step-header"><div class="step-label">Step 02 of 0'+tot+'</div><div class="step-title">Procedure Comparison</div><div class="step-desc">Add one row per procedure being replaced. Select an Autonomous Scrubber or Autonomous Vacuum as the prescribed solution to unlock the Autonomous Evaluation step.</div>'+ISSA_DISCLAIMER+'</div>';
  h+='<div class="card"><div class="card-title">Equipment Selection</div>';

  state.pairs.forEach((pair,pi)=>{
    const ex=getEquip(pair.existingCategory,pair.existingEquipIdx);
    const pr=getEquip(pair.prescribedCategory,pair.prescribedEquipIdx);
    const exEquips=EQUIPMENT[pair.existingCategory]||[];
    const prEquips=EQUIPMENT[pair.prescribedCategory]||[];
    const showRider=pr&&pr.is_rider&&!pr.is_autonomous;
    const pairResult=calcPair(pair);

    h+='<div class="pair-block">';
    if(state.pairs.length>1)h+='<button class="pair-remove" onclick="removePair('+pi+')" title="Remove">✕</button>';
    h+='<div class="pair-num">Procedure '+(pi+1)+(pr&&pr.is_autonomous?'  <span class="tag tag-auto">🤖 Autonomous</span>':'')+'</div>';
    h+='<div class="proc-row">';
    h+='<div><div class="proc-label existing">Existing Procedure</div>';
    h+='<div class="field"><label>Cleaning System</label><select onchange="setPairCat('+pi+',\'existing\',this.value)"><option value="">— Select —</option>'+catOpts(pair.existingCategory)+'</select></div>';
    if(exEquips.length)h+='<div class="field" style="margin-top:10px;"><label>Equipment Size / Model</label><select onchange="setPairEquip('+pi+',\'existing\',this.value)"><option value="-1">— Select —</option>'+equipOpts(pair.existingCategory,pair.existingEquipIdx)+'</select></div>';
    if(ex)h+='<div class="rate-display"><span>'+ex.sqft.toLocaleString(undefined,{maximumFractionDigits:0})+'</span> sq ft/hr  ·  <span>'+ex.mins.toFixed(2)+'</span> min/1,000 sq ft</div>';
    h+='</div>';
    h+='<div class="vs-badge">VS</div>';
    h+='<div><div class="proc-label prescribed">Nilfisk Prescribed</div>';
    h+='<div class="field"><label>Cleaning System</label><select onchange="setPairCat('+pi+',\'prescribed\',this.value)"><option value="">— Select —</option>'+catOpts(pair.prescribedCategory)+'</select></div>';
    if(prEquips.length)h+='<div class="field" style="margin-top:10px;"><label>Equipment Size / Model</label><select onchange="setPairEquip('+pi+',\'prescribed\',this.value)"><option value="-1">— Select —</option>'+equipOpts(pair.prescribedCategory,pair.prescribedEquipIdx)+'</select></div>';
    if(pr)h+='<div class="rate-display"><span>'+pr.sqft.toLocaleString(undefined,{maximumFractionDigits:0})+'</span> sq ft/hr  ·  '+(pr.is_autonomous?'<span style="color:var(--auto)">Autonomous — see next step for labor savings</span>':'<span>'+pr.mins.toFixed(2)+'</span> min/1,000 sq ft')+'</div>';
    h+='</div></div>';
    h+='<div class="form-grid" style="margin-top:16px;"><div class="field"><label>Cleanable Sq Ft</label><input type="number" step="100" onchange="setPairVal('+pi+',\'sqFt\',this.value)" value="'+pair.sqFt+'"><span class="hint">Total cleanable area per cleaning</span></div><div class="field"><label>Cleanings per '+state.period+'</label><input type="number" onchange="setPairVal('+pi+',\'cleaningsPerPeriod\',this.value)" value="'+pair.cleaningsPerPeriod+'"></div></div>';

    // Rider row with tooltip
    if(showRider)h+='<div class="rider-row"><label><span class="tooltip-wrap"><strong>Rider Bonus Productivity</strong> '+RIDER_TOOLTIP+'</span><br><span style="opacity:0.7;font-size:0.78rem;">% added on top of ISSA rate — hover <strong>?</strong> for explanation</span></label><input type="range" min="0" max="50" step="5" value="'+state.riderBonus+'" oninput="state.riderBonus=parseInt(this.value);document.getElementById(\'riderValDisplay\').textContent=this.value+\'%\';updateRiderDisplays();"><div class="val" id="riderValDisplay">'+state.riderBonus+'%</div></div>';

    if(ex&&pr&&!pr.is_autonomous){
      h+='<div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;">';
      h+='<div class="rate-display" style="flex:1;">Time saved / cleaning: <span>'+fmtH(pairResult.savingsPerCleaning)+'</span></div>';
      h+='<div class="rate-display" style="flex:1;">Time saved / '+state.period+': <span id="pairTimeSaved'+pi+'">'+fmtH(pairResult.timePerPeriod)+'</span></div>';
      h+='<div class="rate-display" style="flex:1;">Improvement: <span id="pairImprov'+pi+'">'+fmtP(pairResult.savingsPct)+'</span></div>';
      h+='</div>';
    }
    h+='</div>';
  });

  h+='<button class="add-btn" onclick="addPair()" style="margin-top:4px;">+ Add Another Procedure</button>';
  h+='</div>';
  h+='<div class="card"><div class="card-title">Global Parameters</div><div class="form-grid"><div class="field"><label>Period</label><select id="period"><option value="Week" '+(state.period==='Week'?'selected':'')+'>Week</option><option value="Year" '+(state.period==='Year'?'selected':'')+'>Year</option></select></div></div></div>';

  const anyComplete=state.pairs.some(p=>getEquip(p.existingCategory,p.existingEquipIdx)&&getEquip(p.prescribedCategory,p.prescribedEquipIdx));
  if(anyComplete){
    h+='<div class="summary-bar"><div class="sb-item"><div class="sb-label">Total Procedures</div><div class="sb-val" id="sumProcCount">'+state.pairs.filter(p=>getEquip(p.existingCategory,p.existingEquipIdx)&&getEquip(p.prescribedCategory,p.prescribedEquipIdx)).length+'</div></div><div class="sb-item"><div class="sb-label">Total Time Saved / '+state.period+'</div><div class="sb-val" id="sumTimeSaved">'+fmtH(r.totalTimePerPeriod)+'</div></div><div class="sb-item"><div class="sb-label">Avg Improvement</div><div class="sb-val" id="sumAvgImprov">'+fmtP(r.avgSavingsPct)+'</div></div><div class="sb-item"><div class="sb-label">Period</div><div class="sb-val">'+state.period+'</div></div></div>';
  }
  const nextLabel=hasAutonomousPrescribed()?'Continue to Autonomous Evaluation →':'Continue to Payback →';
  h+='<div class="nav-bar"><button class="btn btn-secondary" onclick="prevStep()">← Back</button><button class="btn btn-primary" onclick="nextStep()">'+nextLabel+'</button></div>';
  return h;
}

function renderStepAuto(){
  const a=calcAuto();
  const tot=totalSteps();
  let h='<div class="step-header"><div class="step-label auto">Step 02b of 0'+tot+' — Autonomous</div><div class="step-title">Autonomous Evaluation</div><div class="step-desc">Configure your autonomous deployment. The operator is freed during machine run time — only supervision and maintenance hours are counted as labor.</div></div>';
  if(a.autoEquip){h+='<div class="auto-badge">🤖 '+esc(a.autoEquip.size)+(a.autoEquip.model?' — '+esc(a.autoEquip.model):'')+' · '+a.autoEquip.sqft.toLocaleString()+' sq ft/hr practical</div>';}
  h+='<div class="auto-card"><div class="auto-card-title">Deployment Configuration</div>';
  h+='<div class="form-grid"><div class="field"><label>Sq Ft per Autonomous Run</label><input type="number" step="100" id="autoSqFtPerRun" value="'+state.autoSqFtPerRun+'"><span class="hint">Area the robot cleans per deployment</span></div><div class="field"><label>Runs per '+state.period+'</label><input type="number" id="autoCleaningsPerPeriod" value="'+state.autoCleaningsPerPeriod+'"></div><div class="field"><label>Maintenance Time per Run (hrs)</label><input type="number" id="autoMaintenanceHrs" value="'+state.autoMaintenanceHrs+'" step="0.25"><span class="hint">Prep, refill, end-of-run tasks (default 0.15)</span></div></div>';
  h+='<div class="auto-supervision-row"><label><span class="tooltip-wrap"><strong>Supervision Required</strong> <span class="tooltip-icon" data-tip="'+AUTO_SUP_TIP_TEXT+'">?</span></span><br><span style="opacity:0.7;font-size:0.78rem;">% of machine run time operator must be present (default 0%)</span></label><input type="range" id="autoSupervisionRange" min="5" max="40" step="5" value="'+state.autoSupervisionPct+'" oninput="state.autoSupervisionPct=parseInt(this.value);document.getElementById(\'autoSupVal\').textContent=this.value+\'%\';updateAutoDisplays();"><div class="val" id="autoSupVal">'+state.autoSupervisionPct+'%</div></div>';
  h+='</div>';

    h+=row('Runs per '+state.period,a.cleaningsPerPeriod,'User input');
    h+=rrow('Total labor freed / '+state.period,fmtH(a.laborSavedPerPeriod),fmtH(a.laborSavedPerCleaning)+' × '+a.cleaningsPerPeriod);
    h+='</table></div>';

  h+='</table></div></div></div>';
  return h;

function setPairVal(pi,field,val){state.pairs[pi][field]=val;render();}
function addPair(){state.pairs.push({existingCategory:'',existingEquipIdx:-1,prescribedCategory:'',prescribedEquipIdx:-1,sqFt:60000,cleaningsPerPeriod:7});render();}
function removePair(pi){if(state.pairs.length<=1)return;state.pairs.splice(pi,1);render();}
function updatePI(i,f,v){state.proposalItems[i][f]=v;const r=calc();document.querySelectorAll('.total-cell').forEach((el,idx)=>{const item=state.proposalItems[idx];if(!item)return;const t=(parseFloat(item.qty)||0)*(parseFloat(item.unitCost)||0);el.textContent=t>0?fmtC(t):'—';});const rows=document.querySelectorAll('.total-row .tv');if(rows.length)rows[rows.length-1].textContent=fmtC(r.proposalTotal);}

function nextStep(){if(state.step<maxStep()){state.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(state.step>1){state.step--;render();window.scrollTo(0,0);}}

// ── GLOBAL TOOLTIP ───────────────────────────────────────────────────────────
// The tooltip div lives directly on <body> — completely outside the app's
// stacking contexts, sticky header, and any overflow:hidden ancestors.
// Icons carry their text in data-tip="..."; JS positions the shared box.
(function(){
  const tip = document.getElementById('globalTooltip');
  let hideTimer = null;

  function show(icon) {
    const text = icon.getAttribute('data-tip');
    if (!text) return;
    clearTimeout(hideTimer);
    tip.textContent = text;
    tip.style.display = 'block';
    tip.style.opacity = '0';

    // Measure after display:block so offsetWidth/Height are real
    requestAnimationFrame(function() {
      const r = icon.getBoundingClientRect();
      const tw = tip.offsetWidth;
      const th = tip.offsetHeight;
      let left = r.left + r.width / 2 - tw / 2;
      let top  = r.top - th - 10;
      // clamp horizontally
      left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
      // flip below if would go above viewport
      if (top < 8) top = r.bottom + 10;
      tip.style.left = left + 'px';
      tip.style.top  = top  + 'px';
      tip.style.transition = 'opacity 0.15s';
      tip.style.opacity = '1';
    });
  }

  function hide() {
    hideTimer = setTimeout(function() {
      tip.style.opacity = '0';
      setTimeout(function(){ tip.style.display = 'none'; }, 150);
    }, 80);
  }

  document.addEventListener('mouseover', function(e) {
    const icon = e.target.closest('.tooltip-icon[data-tip]');
    if (icon) show(icon);
  });
  document.addEventListener('mouseout', function(e) {
    const icon = e.target.closest('.tooltip-icon[data-tip]');
    if (icon) hide();
  });
})();

// These patch only the affected display elements on slider input so the DOM

function updateRiderDisplays(){
  const r=calc();
  // per-pair spans
  state.pairs.forEach(function(pair,pi){
    const p=calcPair(pair);
    const ts=document.getElementById('pairTimeSaved'+pi);
    const imp=document.getElementById('pairImprov'+pi);
    if(ts)ts.textContent=fmtH(p.timePerPeriod);
    if(imp)imp.textContent=fmtP(p.savingsPct);
  });
  // summary bar
  const st=document.getElementById('sumTimeSaved');
  const si=document.getElementById('sumAvgImprov');
  if(st)st.textContent=fmtH(r.totalTimePerPeriod);
  if(si)si.textContent=fmtP(r.avgSavingsPct);
}

function updateAutoDisplays(){
  const a=calcAuto();
  // bottom summary bar
  const pct=document.getElementById('autoSupPct');
  const run=document.getElementById('autoMachineRun');
  const freed=document.getElementById('autoOpFreed');
  const period=document.getElementById('autoFreedPeriod');
  if(pct)pct.textContent=state.autoSupervisionPct+'%';
  if(run)run.textContent=fmtH(a.machineRunTime);
  if(freed)freed.textContent=fmtH(a.laborSavedPerCleaning);
  if(period)period.textContent=fmtH(a.laborSavedPerPeriod);
  // labor time comparison card
  const convTime=document.getElementById('autoConvTime');
  const opTime=document.getElementById('autoOpTime');
  const supTime=document.getElementById('autoSupTime');
  const maintTime=document.getElementById('autoMaintTime');
  if(convTime)convTime.textContent=fmtH(a.conventionalTimePerCleaning);
  if(opTime)opTime.textContent=fmtH(a.operatorTimePerCleaning);
  if(supTime)supTime.textContent=fmtH(a.supervisionTimePerCleaning);
  if(maintTime)maintTime.textContent=fmtH(a.maintenancePerCleaning);
  // three metric cards
  const mRun=document.getElementById('autoMetricRunTime');
  const mFreedRun=document.getElementById('autoMetricFreedRun');
  const mConvSub=document.getElementById('autoMetricConvSub');
  const mFreedPeriod=document.getElementById('autoMetricFreedPeriod');
  const mSavedSub=document.getElementById('autoMetricSavedSub');
  if(mRun)mRun.textContent=fmtH(a.machineRunTime);
  if(mFreedRun)mFreedRun.textContent=fmtH(a.laborSavedPerCleaning);
  if(mConvSub)mConvSub.textContent=fmtH(a.conventionalTimePerCleaning);
  if(mFreedPeriod)mFreedPeriod.textContent=fmtH(a.laborSavedPerPeriod);
  if(mSavedSub)mSavedSub.textContent=fmtH(a.laborSavedPerCleaning);
}
